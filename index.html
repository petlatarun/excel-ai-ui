<!DOCTYPE html>
<html>
<head>
    <title>Excel AI Processor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #progressBar {
            width: 100%;
            background: #ddd;
            margin-top: 20px;
            border-radius: 5px;
            display: none;
        }

        #progress {
            width: 0%;
            height: 20px;
            background: #4CAF50;
            border-radius: 5px;
        }

        #status {
            margin-top: 10px;
            font-size: 14px;
            color: gray;
        }

        #downloadLink {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Excel AI Processor</h2>

    <input type="file" id="fileInput" /><br><br>

    <button onclick="uploadFile()">Process File</button>

    <div id="progressBar">
        <div id="progress"></div>
    </div>

    <div id="status"></div>

    <a id="downloadLink">⬇ Download Processed File</a>
</div>

<script>
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    const progressBar = document.getElementById("progressBar");
    const progress = document.getElementById("progress");
    const status = document.getElementById("status");
    const link = document.getElementById("downloadLink");

    if (!file) {
        alert("Select a file");
        return;
    }

    progressBar.style.display = "block";
    link.style.display = "none";

    const formData = new FormData();
    formData.append("file", file);

    // 🔥 Simulated progress
    let percent = 0;

    const interval = setInterval(() => {
        percent += 10;
        progress.style.width = percent + "%";

        if (percent < 30) status.innerText = "Uploading file...";
        else if (percent < 70) status.innerText = "Processing with AI...";
        else status.innerText = "Finalizing output...";

        if (percent >= 90) clearInterval(interval);
    }, 500);

    const response = await fetch("https://ai-excel-processor-113337298162.asia-south1.run.app/process-excel", {
        method: "POST",
        body: formData
    });

    clearInterval(interval);
    progress.style.width = "100%";
    status.innerText = "Completed ✅";

    if (!response.ok) {
        alert("Error");
        return;
    }

    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);

    link.href = url;
    link.download = "output.xlsx";
    link.style.display = "block";
}
</script>

</body>
</html>
