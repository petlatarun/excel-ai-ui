<!DOCTYPE html>
<html>
<head>
    <title>Excel AI Processor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        #downloadLink {
            display: none;
            margin-top: 20px;
            display: block;
            color: #007BFF;
            text-decoration: none;
        }

        #loading {
            display: none;
            margin-top: 15px;
            color: orange;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Excel AI Processor</h2>

    <input type="file" id="fileInput" />
    <br>

    <button onclick="uploadFile()">Process File</button>

    <div id="loading">⏳ Processing...</div>

    <a id="downloadLink">⬇ Download Processed File</a>
</div>

<script>
async function uploadFile() {
    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];
    const loading = document.getElementById("loading");
    const link = document.getElementById("downloadLink");

    if (!file) {
        alert("Please select a file");
        return;
    }

    loading.style.display = "block";
    link.style.display = "none";

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("https://ai-excel-processor-113337298162.asia-south1.run.app/process-excel", {
        method: "POST",
        body: formData
    });

    loading.style.display = "none";

    if (!response.ok) {
        alert("Error processing file");
        return;
    }

    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);

    link.href = url;
    link.download = "output.xlsx";
    link.style.display = "block";
}
</script>

</body>
</html>
