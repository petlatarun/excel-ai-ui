<!DOCTYPE html>
<html>
<head>
    <title>Excel AI Processor</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .drop-zone {
            border: 2px dashed #aaa;
            padding: 20px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .drop-zone.dragover {
            background: #e3f2fd;
            border-color: #2196F3;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #progressBar {
            width: 100%;
            background: #ddd;
            margin-top: 20px;
            display: none;
        }

        #progress {
            height: 20px;
            width: 0%;
            background: #4CAF50;
        }

        #history {
            margin-top: 20px;
            text-align: left;
        }

        .history-item {
            font-size: 13px;
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Excel AI Processor</h2>

    <div id="dropZone" class="drop-zone">
        Drag & Drop Excel File Here<br>or Click to Select
    </div>

    <input type="file" id="fileInput" style="display:none;" />

    <button onclick="uploadFile()">Process File</button>

    <div id="progressBar">
        <div id="progress"></div>
    </div>

    <div id="status"></div>

    <a id="downloadLink" style="display:none;">⬇ Download File</a>

    <div id="history">
        <h4>📜 History</h4>
    </div>
</div>

<script>
let selectedFile = null;

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");

// Click opens file picker
dropZone.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
    selectedFile = e.target.files[0];
    dropZone.innerText = selectedFile.name;
};

// Drag events
dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    selectedFile = e.dataTransfer.files[0];
    dropZone.innerText = selectedFile.name;
});

// Upload
async function uploadFile() {
    if (!selectedFile) {
        alert("Select a file");
        return;
    }

    const progress = document.getElementById("progress");
    const progressBar = document.getElementById("progressBar");
    const status = document.getElementById("status");
    const link = document.getElementById("downloadLink");

    progressBar.style.display = "block";
    link.style.display = "none";

    let percent = 0;

    const interval = setInterval(() => {
        percent += 10;
        progress.style.width = percent + "%";

        if (percent < 30) status.innerText = "Uploading...";
        else if (percent < 70) status.innerText = "Processing...";
        else status.innerText = "Finalizing...";

        if (percent >= 90) clearInterval(interval);
    }, 400);

    const formData = new FormData();
    formData.append("file", selectedFile);

    const response = await fetch("https://ai-excel-processor-113337298162.asia-south1.run.app/process-excel", {
        method: "POST",
        body: formData
    });

    clearInterval(interval);
    progress.style.width = "100%";
    status.innerText = "Completed ✅";

    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);

    link.href = url;
    link.download = "output.xlsx";
    link.style.display = "block";

    saveHistory(selectedFile.name);
}

// Save history
function saveHistory(filename) {
    let history = JSON.parse(localStorage.getItem("history") || "[]");

    history.unshift({
        name: filename,
        time: new Date().toLocaleString()
    });

    localStorage.setItem("history", JSON.stringify(history));
    renderHistory();
}

// Render history
function renderHistory() {
    const historyDiv = document.getElementById("history");
    let history = JSON.parse(localStorage.getItem("history") || "[]");

    historyDiv.innerHTML = "<h4>📜 History</h4>";

    history.forEach(item => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerText = `${item.name} - ${item.time}`;
        historyDiv.appendChild(div);
    });
}

renderHistory();
</script>

</body>
</html>
